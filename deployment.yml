kind: Deployment
apiVersion: apps/v1
metadata:
  name: zookeeper
  namespace: kafka
spec:
  template:
    metadata:
      labels:
        app: zookeeper
        name: zookeeper
    spec:
      volumes:
        - name: zoo-conf
          persistentVolumeClaim:
            claimName: zoo-1-pvc
      containers:
        - name: zookeeper
          image: bitnami/zookeeper:latest
          env:
           - name: ALLOW_ANONYMOUS_LOGIN
             value: "yes"
          volumeMounts:
          - mountPath: /conf
            name: zoo-conf
          - mountPath: /data
            name: zoo-conf
          - mountPath: /logs
            name: zoo-conf
          - mountPath: /datalog
            name: zoo-conf
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      name: zookeeper
  strategy:
    type: RollingUpdate
